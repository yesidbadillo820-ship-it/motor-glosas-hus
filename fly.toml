# fly.toml app configuration file generated for motor-glosas-hus on 2026-05-04T18:59:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'motor-glosas-hus'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = "python -c 'from app.database import Base, engine; Base.metadata.create_all(bind=engine); print(\"DB schema OK\")'"

[env]
  ANTHROPIC_MODEL = 'claude-sonnet-4-5'
  ENV = 'production'
  LOG_LEVEL = 'INFO'
  SOPORTES_LOCAL_ROOT = '/data/soportes'
  SOPORTES_ROOT = '/data/soportes'

[[mounts]]
  source = 'soportes_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
