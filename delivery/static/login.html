<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ingreso — Panel Domicilios</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .bg-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0ea5e9 100%); }
</style>
</head>
<body class="min-h-screen bg-gradient flex items-center justify-center p-4">
  <div class="bg-white/95 backdrop-blur rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white text-3xl mb-3">🛵</div>
      <h1 class="text-2xl font-bold text-slate-800">Panel de Domicilios</h1>
      <p class="text-slate-500 text-sm">Centro de operaciones de entregas</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
        <input id="email" type="email" required value="admin@delivery.app"
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input id="password" type="password" required value="admin1234"
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition">
        Ingresar
      </button>
      <div id="error" class="hidden text-red-600 text-sm text-center"></div>
    </form>

    <p class="text-xs text-slate-400 text-center mt-6">v0.1 — MVP</p>
  </div>

<script>
const form = document.getElementById('loginForm');
const errBox = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.classList.add('hidden');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.detail || 'Credenciales inválidas');
    }
    const data = await res.json();
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('usuario', JSON.stringify({nombre: data.nombre, rol: data.rol, email: data.email}));
    window.location.href = '/';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
});
</script>
</body>
</html>
