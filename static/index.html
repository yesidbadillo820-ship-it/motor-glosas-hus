<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ESE HUS IA PRO v4.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root{
            --navy:#0b1829;--navy-2:#122240;--navy-3:#1c3460;
            --blue:#1a56db;--blue-lt:#3b82f6;--blue-glow:rgba(59,130,246,.18);
            --teal:#0d9488;--teal-lt:#14b8a6;
            --red:#dc2626;--amber:#d97706;--green:#16a34a;--green-lt:#22c55e;
            --slate:#64748b;--slate-lt:#94a3b8;
            --bg:#f1f5fb;--bg-card:#ffffff;
            --border:#e2eaf5;--border-2:#cbd5e1;
            --text:#0b1829;--text-2:#374151;
            --radius:12px;--radius-lg:18px;
            --shadow:0 1px 3px rgba(11,24,41,.06),0 4px 16px rgba(11,24,41,.06);
            --shadow-md:0 4px 6px rgba(11,24,41,.07),0 10px 30px rgba(11,24,41,.1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;overflow:hidden;font-size:14px}
        header{background:var(--navy);padding:0 1.75rem;display:flex;align-items:center;justify-content:space-between;height:58px;flex-shrink:0;position:relative;z-index:100;border-bottom: 3px solid var(--teal);}
        .logo{display:flex;align-items:center;gap:.85rem}
        .logo-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--blue) 0%,var(--teal) 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:800;font-size:13px;color:#fff;box-shadow:0 4px 12px rgba(26,86,219,.35);}
        .logo-title{font-family:'Outfit';font-weight:700;font-size:.95rem;color:#fff;}
        nav{display:flex;gap:.15rem;align-items:center}
        .nav-btn{color:rgba(255,255,255,.45);font-size:.76rem;font-weight:600;cursor:pointer;border:none;background:none;padding:.5rem .85rem;border-radius:8px;transition:all .2s;text-transform:uppercase;position:relative}
        .nav-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
        .nav-btn.active{color:#fff;background:rgba(59,130,246,.18)}
        .alerta-badge{position:absolute;top:3px;right:5px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
        main{display:flex;flex:1;height:calc(100vh - 58px);overflow:hidden}
        .sidebar{width:316px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);padding:1.4rem 1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
        .tab-panel{flex:1;overflow:auto;display:none;padding:1.4rem;}
        .tab-panel.active{display:flex;flex-direction:column}
        .field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.65rem}
        .field label{font-size:.72rem;font-weight:600;color:var(--navy-3);}
        input,select,textarea{background:#f8fafd;border:1.5px solid var(--border);border-radius:9px;padding:.55rem .8rem;font-size:.83rem;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;}
        .etapa-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
        .etapa-opt{border:1.5px solid var(--border);border-radius:9px;padding:.55rem .3rem;text-align:center;cursor:pointer;font-size:.66rem;font-weight:700;text-transform:uppercase;color:var(--slate);background:#f8fafd;}
        .etapa-opt.active{background:var(--navy);color:#fff;border-color:var(--navy);}
        .btn{display:flex;align-items:center;justify-content:center;gap:.5rem;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:.83rem;padding:.65rem 1.2rem;transition:all .2s;}
        .btn-primary{background:linear-gradient(135deg,var(--blue) 0%,var(--navy-3) 100%);color:#fff;}
        .btn-teal{background:var(--teal);color:#fff;}
        .btn-outline{background:transparent;border:1.5px solid var(--border-2);color:var(--slate);}
        .paste-box{width:100%;padding:1.25rem;border:2px dashed var(--blue-lt);border-radius:var(--radius);text-align:center;background:#eff6ff;color:var(--blue);font-weight:600;cursor:pointer;outline:none;margin-bottom:1rem;}
        .hist-table{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;width:100%;}
        .hist-table table{width:100%;border-collapse:collapse;font-size:.78rem}
        .hist-table th{background:var(--navy);color:#fff;padding:.65rem .9rem;text-align:left;}
        .hist-table td{padding:.6rem .9rem;border-bottom:1px solid var(--border);}
        .dictamen-box{background:#f8fafd;border:1px solid var(--border);border-radius:10px;padding:1.5rem;font-size:11.5px;line-height:1.8;max-height:500px;overflow-y:auto;color:var(--text-2);}
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--navy);color:#fff;padding:.75rem 1.2rem;border-radius:10px;z-index:9999;transform:translateY(100px);opacity:0;transition:0.3s;}
        .toast.show{transform:translateY(0);opacity:1}
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-badge">HUS</div>
        <div class="logo-text">
            <div class="logo-title">Motor de Glosas IA</div>
            <div style="font-size:9px;color:rgba(255,255,255,0.5)">ESE HUS · PRO v4.0</div>
        </div>
    </div>
    <nav id="main-nav">
        <button class="nav-btn active" onclick="cambiarTab(event, 'analizar')">Individual</button>
        <button class="nav-btn" onclick="cambiarTab(event, 'batch')">Lote (Excel)</button>
        <button class="nav-btn" onclick="cambiarTab(event, 'dashboard')">Analytics</button>
        <button class="nav-btn" onclick="cambiarTab(event, 'historial')">Historial</button>
        <button class="nav-btn" onclick="cambiarTab(event, 'alertas')">Alertas <span id="alerta-badge" class="alerta-badge" style="display:none">0</span></button>
        <button class="nav-btn" onclick="cambiarTab(event, 'contratos')">Config</button>
    </nav>
</header>

<main>
    <aside class="sidebar" id="sidebar">
        <div class="field">
            <label>EPS / Pagador</label>
            <select id="eps-select"></select>
        </div>
        <div class="field">
            <label>Etapa</label>
            <div class="etapa-row">
                <div class="etapa-opt active" data-val="INICIAL" onclick="setEtapa(this)">Inicial</div>
                <div class="etapa-opt" data-val="RATIFICACION" onclick="setEtapa(this)">Ratif.</div>
            </div>
            <input type="hidden" id="etapa-val" value="INICIAL"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div class="field"><label>F. Radicación</label><input type="date" id="fecha-rad"/></div>
            <div class="field"><label>F. Recepción</label><input type="date" id="fecha-rec"/></div>
        </div>
        <div class="field">
            <label>Valor Aceptado</label>
            <input type="number" id="valor-acep" value="0"/>
        </div>
        <div class="field">
            <label>Descripción / Tabla</label>
            <textarea id="tabla-excel" rows="6" placeholder="Pegue aquí el texto de la glosa..."></textarea>
        </div>
        <div class="field">
            <label>Soportes PDF</label>
            <input type="file" id="pdf-files" multiple accept=".pdf"/>
        </div>
        <button class="btn btn-primary" id="btn-analizar" onclick="analizar()" style="width:100%">⚡ Analizar Glosa</button>
        <button class="btn btn-outline" onclick="limpiarTodo()" style="width:100%; margin-top:10px">Limpiar</button>
    </aside>

    <div class="content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="tab-panel active" id="panel-analizar">
            <div id="result-area" style="flex:1">
                <div style="text-align:center;padding:5rem;opacity:0.5">⚖️ Complete los datos para iniciar el análisis jurídico.</div>
            </div>
            <div id="result-actions" style="display:none;gap:1rem;margin-top:1rem;padding:1rem;background:white;border-top:1px solid var(--border)">
                <button class="btn btn-teal" onclick="descargarPDF()">📥 Generar PDF Oficial HUS</button>
                <button class="btn btn-primary" onclick="copiarDictamen()">📋 Copiar Texto para Excel</button>
            </div>
        </div>

        <div class="tab-panel" id="panel-batch">
            <h3 style="margin-bottom:1rem">Procesamiento Masivo desde Excel</h3>
            <input type="text" id="paste-box" class="paste-box" placeholder="📋 Ctrl+V para pegar filas desde Excel..." autocomplete="off">
            <div id="batch-preview" class="hist-table" style="display:none;margin-bottom:1rem;max-height:200px;overflow:auto">
                <table><tbody id="batch-tbody"></tbody></table>
            </div>
            <button class="btn btn-primary" id="btn-batch" onclick="procesarLote()" disabled>🚀 Iniciar Procesamiento</button>
            <div id="batch-progress" style="display:none;margin-top:1rem">
                <div style="background:#eee;border-radius:10px;height:10px;overflow:hidden">
                    <div id="batch-fill" style="background:var(--teal);height:100%;width:0%"></div>
                </div>
                <div id="batch-status" style="font-size:12px;margin-top:5px;text-align:center"></div>
            </div>
            <div id="batch-results" style="margin-top:1rem; overflow-y:auto"></div>
        </div>

        <div class="tab-panel" id="panel-dashboard">
            <div id="kpi-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem; flex:1">
                <div style="background:white; padding:1rem; border-radius:12px; border:1px solid var(--border)"><h4>Top EPS</h4><canvas id="chart-eps"></canvas></div>
                <div style="background:white; padding:1rem; border-radius:12px; border:1px solid var(--border)"><h4>Top Códigos</h4><canvas id="chart-codigos"></canvas></div>
            </div>
        </div>

        <div class="tab-panel" id="panel-historial">
            <div class="hist-table" style="flex:1; overflow-y:auto">
                <table>
                    <thead style="position:sticky; top:0; z-index:10"><tr><th>Fecha</th><th>EPS</th><th>Paciente</th><th>Código</th><th>Estado</th><th>Valor Obj.</th></tr></thead>
                    <tbody id="hist-tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-panel" id="panel-contratos">
            <div id="contratos-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1rem"></div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
    const AUTH_TOKEN = "HUS2026";
    const headersAuth = { 'Authorization': `Bearer ${AUTH_TOKEN}` };
    let loteRawData = [];
    let ultimoResultado = null;

    window.onload = () => { cargarContratos(); fetchAlertas(); };

    function cambiarTab(e, tab) {
        document.querySelectorAll('.nav-btn, .tab-panel').forEach(el => el.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(`panel-${tab}`).classList.add('active');
        document.getElementById('sidebar').style.display = (tab === 'analizar' || tab === 'batch') ? 'flex' : 'none';
        if(tab === 'dashboard') cargarDashboard();
        if(tab === 'historial') cargarHistorial();
    }

    async function cargarContratos() {
        try {
            const res = await fetch('/contratos', { headers: headersAuth });
            const data = await res.json();
            const sel = document.getElementById('eps-select');
            const cont = document.getElementById('contratos-container');
            sel.innerHTML = '<option value="OTRA / SIN DEFINIR">OTRA / SIN DEFINIR ▼</option>';
            cont.innerHTML = '';
            data.forEach(c => {
                sel.innerHTML += `<option value="${c.eps}">${c.eps}</option>`;
                cont.innerHTML += `<div style="background:white; padding:1rem; border-radius:12px; border:1px solid var(--border); box-shadow:var(--shadow)">
                    <b style="color:var(--navy)">${c.eps}</b>
                    <p style="font-size:11px;color:var(--slate); margin-top:5px">${c.detalles}</p>
                </div>`;
            });
        } catch(e) { console.error(e); }
    }

    async function analizar() {
        const btn = document.getElementById('btn-analizar');
        btn.disabled = true; btn.innerText = "⏳ Analizando...";
        
        const fd = new FormData();
        fd.append('eps', document.getElementById('eps-select').value);
        fd.append('etapa', document.getElementById('etapa-val').value);
        fd.append('fecha_radicacion', document.getElementById('fecha-rad').value || '');
        fd.append('fecha_recepcion', document.getElementById('fecha-rec').value || '');
        fd.append('valor_aceptado', document.getElementById('valor-acep').value || '0');
        
        // ¡AQUÍ ESTABA EL ERROR! El ID en el HTML es 'tabla-excel'
        const tablaExcelTexto = document.getElementById('tabla-excel').value || 'Sin descripción';
        fd.append('tabla_excel', tablaExcelTexto);

        const inputArchivos = document.getElementById('pdf-files');
        if (inputArchivos.files.length > 0) {
            for (let f of inputArchivos.files) fd.append('archivos', f);
        }

        try {
            const res = await fetch('/analizar', { method: 'POST', headers: headersAuth, body: fd });
            
            if (!res.ok) {
                const errData = await res.json();
                console.error("Error del servidor:", errData);
                throw new Error("El servidor rechazó la solicitud (422). Revisa la consola.");
            }
            
            const d = await res.json();
            ultimoResultado = d;
            document.getElementById('result-area').innerHTML = `
                <div class="dictamen-box">
                    <h3 style="color:var(--navy);margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:10px">${d.resumen}</h3>
                    <div style="margin-bottom:15px">
                        <span style="background:var(--blue);color:white;padding:4px 10px;border-radius:6px; font-weight:bold; font-size:12px">${d.codigo_glosa}</span>
                        <span style="margin-left:10px; font-size:11px; font-weight:bold; color:var(--red)">${d.mensaje_tiempo}</span>
                    </div>
                    ${d.dictamen}
                </div>`;
            document.getElementById('result-actions').style.display = 'flex';
        } catch(e) { 
            alert("Error: " + e.message); 
        }
        btn.disabled = false; btn.innerText = "⚡ Analizar Glosa";
    }    

    document.getElementById('paste-box').addEventListener('paste', e => {
        e.preventDefault();
        const rows = (e.clipboardData || window.clipboardData).getData('text').trim().split('\n');
        loteRawData = rows;
        const tbody = document.getElementById('batch-tbody'); tbody.innerHTML = '';
        rows.forEach(r => {
            const tr = document.createElement('tr');
            r.split('\t').forEach(c => { const td = document.createElement('td'); td.innerText=c; tr.appendChild(td); });
            tbody.appendChild(tr);
        });
        document.getElementById('batch-preview').style.display = 'block';
        document.getElementById('btn-batch').disabled = false;
    });

    async function procesarLote() {
        const btn = document.getElementById('btn-batch');
        btn.disabled = true;
        document.getElementById('batch-progress').style.display = 'block';
        const resBox = document.getElementById('batch-results'); resBox.innerHTML = '';
        
        for (let i = 0; i < loteRawData.length; i++) {
            const perc = Math.round(((i + 1) / loteRawData.length) * 100);
            document.getElementById('batch-fill').style.width = perc + '%';
            document.getElementById('batch-status').innerText = `Procesando ${i+1} de ${loteRawData.length}`;

            const fd = new FormData();
            fd.append('eps', document.getElementById('eps-select').value);
            fd.append('etapa', document.getElementById('etapa-val').value);
            fd.append('valor_aceptado', '0');
            fd.append('tabla_excel', loteRawData[i]);

            try {
                const res = await fetch('/analizar', { method: 'POST', headers: headersAuth, body: fd });
                const d = await res.json();
                resBox.innerHTML += `<div style="background:white;padding:10px;border-radius:8px;margin-bottom:5px;border-left:4px solid var(--teal);font-size:11px; box-shadow:var(--shadow)"><b>${d.paciente}</b> | ${d.codigo_glosa} | ${d.valor_objetado}</div>`;
                await new Promise(r => setTimeout(r, 1200));
            } catch(e) { console.error(e); }
        }
        btn.disabled = false;
    }

    async function cargarHistorial() {
        const res = await fetch('/glosas', { headers: headersAuth });
        const data = await res.json();
        const tbody = document.getElementById('hist-tbody');
        tbody.innerHTML = data.map(g => `<tr><td>${g.creado_en.substring(0,10)}</td><td>${g.eps}</td><td>${g.paciente}</td><td>${g.codigo_glosa}</td><td>${g.estado}</td><td>$${g.valor_objetado.toLocaleString()}</td></tr>`).join('');
    }

    async function fetchAlertas() {
        const res = await fetch('/alertas', { headers: headersAuth });
        const data = await res.json();
        const badge = document.getElementById('alerta-badge');
        if(data.length > 0) { badge.innerText = data.length; badge.style.display = 'flex'; }
    }

    function setEtapa(el) {
        document.querySelectorAll('.etapa-opt').forEach(e => e.classList.remove('active'));
        el.classList.add('active'); document.getElementById('etapa-val').value = el.dataset.val;
    }

    function limpiarTodo() { location.reload(); }
    
    async function descargarPDF() {
        const res = await fetch('/descargar-pdf', { 
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_TOKEN}` },
            body: JSON.stringify({ eps: document.getElementById('eps-select').value, resumen: ultimoResultado.resumen, dictamen: ultimoResultado.dictamen })
        });
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `HUS_Oficio_Defensa.pdf`; a.click();
    }

    function copiarDictamen() {
        const tmp = document.createElement('div'); tmp.innerHTML = ultimoResultado.dictamen;
        navigator.clipboard.writeText(tmp.innerText);
        alert("Copiado al portapapeles");
    }
</script>
</body>
</html>
