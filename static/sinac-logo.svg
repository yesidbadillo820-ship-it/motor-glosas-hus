  <text x="110" y="82" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#64748b" letter-spacing="3">SC SAS</text>
  <!-- Franjas decorativas derechas -->
  <path d="M 320 10 L 340 10 L 300 90 L 280 90 Z" fill="url(#gradB)"/>
  <path d="M 350 10 L 370 10 L 330 90 L 310 90 Z" fill="url(#gradD)" opacity="0.85"/>
